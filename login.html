<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | RythuConnect</title>
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"><link rel="stylesheet" href="css/darkmode.css">
</head>
<body>
  <header class="site-header"><nav class="nav container"><a class="logo" href="index.html"><span class="logo-mark">RC</span> RythuConnect</a><div class="nav-actions"><button class="icon-btn" id="darkToggle">Theme</button><a class="ghost-btn" href="register.html">Register</a></div></nav></header>
  <main class="auth-wrap">
    <form class="auth-card form-stack" id="loginForm">
      <div><h1>Welcome back</h1><p>Use mock authentication to open role-based dashboards.</p></div>
      <div class="notice" id="loginNotice"></div>
      <div class="field"><label>Email</label><input type="email" name="email" required placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" name="password" required placeholder="Enter password"></div>
      <div class="field"><label>Role</label><select name="role"><option>Buyer</option><option>Farmer</option><option>Admin</option></select></div>
      <button class="primary-btn">Login</button>
      <p>New here? <a class="pill" href="register.html">Create account</a></p>
    </form>
  </main>
  <script src="js/products.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script><script src="js/language.js"></script><script src="js/weather.js"></script><script src="js/dashboard.js"></script><script src="js/admin.js"></script><script src="js/app.js"></script>
</body>
</html>
