<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace | RythuConnect</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/darkmode.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a class="logo" href="index.html"><span class="logo-mark">RC</span> RythuConnect</a>
      <button class="icon-btn menu-toggle" id="menuToggle" title="Menu">Menu</button>
      <div class="nav-links" id="navLinks"><a href="index.html">Home</a><a class="active" href="marketplace.html">Marketplace</a><a href="farmer-dashboard.html">Farmers</a><a href="weather.html">Weather</a></div>
      <div class="nav-actions"><select id="languageSelect"><option value="english">EN</option><option value="telugu">TE</option><option value="hindi">HI</option></select><button class="icon-btn" id="darkToggle">Theme</button><a class="ghost-btn" href="login.html">Login</a><a class="icon-btn" href="cart.html">Cart <span data-cart-count>0</span></a></div>
    </nav>
  </header>
  <main>
    <section class="page-hero">
      <div class="container page-title">
        <h1>Marketplace</h1>
        <p>Search crops, filter by category, district, organic status, and price range.</p>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <div class="toolbar">
          <div class="field"><label>Search</label><input id="searchInput" placeholder="Search rice, tomato, farmer, district"></div>
          <div class="field"><label>Category</label><select id="categoryFilter"><option value="">All</option><option>Vegetables</option><option>Grains</option><option>Spices</option><option>Fiber</option><option>Fruits</option></select></div>
          <div class="field"><label>District</label><select id="districtFilter"><option value="">All</option><option>Guntur</option><option>Vijayawada</option><option>Kurnool</option><option>Warangal</option><option>Nuzvid</option></select></div>
          <div class="field"><label>Type</label><select id="organicFilter"><option value="">All</option><option value="true">Organic</option><option value="false">Standard</option></select></div>
          <div class="field"><label>Max Price</label><input id="priceFilter" type="number" value="10000" min="1"></div>
        </div>
        <div class="cards-grid" id="marketplaceGrid"></div>
      </div>
    </section>
  </main>
  <script src="js/products.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script><script src="js/language.js"></script><script src="js/weather.js"></script><script src="js/dashboard.js"></script><script src="js/admin.js"></script><script src="js/app.js"></script>
</body>
</html>
