<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | RythuConnect</title>
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/dashboard.css"><link rel="stylesheet" href="css/responsive.css"><link rel="stylesheet" href="css/darkmode.css">
</head>
<body>
  <header class="site-header"><nav class="nav container"><a class="logo" href="index.html"><span class="logo-mark">RC</span> RythuConnect</a><div class="nav-links"><a href="marketplace.html">Marketplace</a><a href="weather.html">Prices</a></div><div class="nav-actions"><button class="icon-btn" id="darkToggle">Theme</button><button class="ghost-btn" onclick="logout()">Logout</button></div></nav></header>
  <main class="dashboard-main">
    <div class="dashboard-header"><div><h1>Admin Panel</h1><p class="muted">Mock moderation, revenue, and platform analytics.</p></div></div>
    <div class="dashboard-grid">
      <article class="dashboard-card"><span>Revenue</span><strong>Rs 3.8L</strong></article>
      <article class="dashboard-card"><span>Active Users</span><strong>2,840</strong></article>
      <article class="dashboard-card"><span>Products</span><strong>4,820</strong></article>
      <article class="dashboard-card"><span>Flagged</span><strong>14</strong></article>
    </div>
    <div class="admin-grid" style="margin-top:22px">
      <section class="panel">
        <h2>Product Moderation</h2>
        <table class="table"><thead><tr><th>Product</th><th>Farmer</th><th>District</th><th>Price</th><th>Action</th></tr></thead><tbody id="adminProducts"></tbody></table>
      </section>
      <section class="panel">
        <h2>User Control</h2>
        <table class="table"><thead><tr><th>User</th><th>Role</th><th>District</th><th>Action</th></tr></thead><tbody id="adminUsers"></tbody></table>
      </section>
    </div>
  </main>
  <script src="js/products.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script><script src="js/language.js"></script><script src="js/weather.js"></script><script src="js/dashboard.js"></script><script src="js/admin.js"></script><script src="js/app.js"></script>
</body>
</html>
