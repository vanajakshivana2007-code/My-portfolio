<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | RythuConnect</title>
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"><link rel="stylesheet" href="css/darkmode.css">
</head>
<body>
  <header class="site-header"><nav class="nav container"><a class="logo" href="index.html"><span class="logo-mark">RC</span> RythuConnect</a><div class="nav-actions"><button class="icon-btn" id="darkToggle">Theme</button><a class="ghost-btn" href="login.html">Login</a></div></nav></header>
  <main class="auth-wrap">
    <form class="auth-card form-stack" id="registerForm">
      <div><h1>Create account</h1><p>Register as farmer or buyer using localStorage authentication.</p></div>
      <div class="notice" id="registerNotice"></div>
      <div class="field"><label>Full Name</label><input name="name" required placeholder="Full name"></div>
      <div class="field"><label>Email</label><input type="email" name="email" required placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" name="password" required placeholder="Create password"></div>
      <div class="field"><label>Role</label><select name="role"><option>Farmer</option><option>Buyer</option></select></div>
      <div class="field"><label>District</label><input name="district" placeholder="Guntur"></div>
      <button class="primary-btn">Create Account</button>
    </form>
  </main>
  <script src="js/products.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script><script src="js/language.js"></script><script src="js/weather.js"></script><script src="js/dashboard.js"></script><script src="js/admin.js"></script><script src="js/app.js"></script>
</body>
</html>
